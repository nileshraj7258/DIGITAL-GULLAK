<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SASTA STORE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="logo-area">
            <h1>SASTA STORE</h1>
            <p>पास में सबसे सस्ता कहाँ?</p>
        </div>
        <div class="google-login-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G">
        </div>
    </header>

    <main id="product-list-container">
        <div class="input-card">
            <div class="photo-box">
                <i class="fas fa-camera"></i>
                <span>Photo चुनें</span>
            </div>
            <input type="text" placeholder="प्रोडक्ट का नाम (जैसे: दूध)">
            <input type="number" placeholder="कीमत (₹)">
            <select>
                <option value="kg">किलो (Kg)</option>
                <option value="L">लीटर (Litre)</option>
                <option value="pkt">पैकेट (Packet)</option>
            </select>
        </div>
    </main>

    <button id="add-btn" class="plus-btn">+</button>

    <script src="script.js"></script>
</body>
</html>

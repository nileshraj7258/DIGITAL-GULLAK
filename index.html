<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Reader AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8fafd; display: flex; flex-direction: column; height: 100vh; }

        /* Header Section */
        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-bottom: 1px solid #e0e0e0;
        }
        .logo { font-size: 22px; font-weight: bold; color: #1a73e8; }
        
        /* Google Profile Icon Button */
        .g-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #4285F4;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        /* Hero Section */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
        }
        .welcome-text { color: #5f6368; font-size: 1.2rem; }
        .hero-title { font-size: 2.5rem; color: #202124; margin-top: 10px; line-height: 1.2; }

        /* Bottom Input Bar */
        .input-container {
            padding: 20px;
            background: white;
        }
        .input-bar {
            background: #f1f3f4;
            border-radius: 30px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .plus-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #5f6368;
            cursor: pointer;
        }
        input[type="text"] {
            flex: 1;
            border: none;
            background: none;
            outline: none;
            font-size: 16px;
        }
        /* Hidden File Input */
        #file-input { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Mind Reader</div>
        <button class="g-icon" onclick="showEmails()">G</button>
    </header>

    <div class="main-content">
        <p class="welcome-text">Hi <span id="user-name">User</span></p>
        <h1 class="hero-title">Where should we <br> start?</h1>
    </div>

    <div class="input-container">
        <div class="input-bar">
            <label for="file-input" class="plus-btn">+</label>
            <input type="file" id="file-input" accept="image/*" multiple>
            
            <input type="text" placeholder="Ghhj">
        </div>
    </div>

    <script>
        // गैलरी ओपन होने पर अलर्ट (सिर्फ डेमो के लिए)
        document.getElementById('file-input').onchange = function() {
            alert(this.files.length + " फोटो सिलेक्ट की गईं!");
        };

        // G आइकॉन पर क्लिक करने का फंक्शन
        function showEmails() {
            // यहाँ आप भविष्य में Google Login API जोड़ सकते हैं
            let name = prompt("आपका नाम क्या है?");
            if(name) {
                document.getElementById('user-name').innerText = name;
            }
            alert("यहाँ मोबाइल के ईमेल शो करने का फंक्शन आएगा।");
        }
    </script>

</body>
</html>

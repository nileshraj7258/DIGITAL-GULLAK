<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>डिजिटल गुल्लक</title>
    <style>
        body { background-color: #0f0f1e; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1e1e3f; padding: 30px; border-radius: 20px; border: 1px solid #00d2ff; margin-top: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .amount { font-size: 45px; font-weight: bold; color: #00d2ff; margin: 20px 0; }
        button { background: #673ab7; color: white; border: none; padding: 18px; border-radius: 12px; font-size: 18px; width: 100%; margin-top: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h2 style="margin-top:20px;">नमस्ते नीलेश राज!</h2>
    <div class="card">
        <p style="opacity:0.8;">कुल बचत राशि</p>
        <div class="amount">₹<span id="bal">0.00</span></div>
        <button onclick="add(10)">+ ₹10 जमा करें</button>
        <button style="background:#22c55e" onclick="add(500)">+ ₹500 जमा करें</button>
        <button style="background:#e91e63" onclick="alert('निकासी जल्द शुरू होगी')">पैसे निकालें</button>
    </div>
    <p style="margin-top:30px; font-size:12px; color:#888;">यह आपका सुरक्षित डिजिटल वॉलेट है।</p>
    <script>
        let b = parseFloat(localStorage.getItem('m')) || 0;
        function update() { document.getElementById('bal').innerText = b.toFixed(2); localStorage.setItem('m', b); }
        function add(v) { b += v; update(); alert('सफलतापूर्वक ₹' + v + ' जमा हो गए!'); }
        window.onload = update;
    </script>
</body>
</html>

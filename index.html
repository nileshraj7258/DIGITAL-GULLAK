<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sabse Sasta | All-in-One</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        body { background: #fff; height: 100vh; overflow: hidden; }

        /* --- Page Swapping Logic --- */
        .page { display: none; height: 100vh; flex-direction: column; }
        .active-page { display: flex; }

        /* --- HOME PAGE STYLING --- */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; }
        .logo-area h1 { font-size: 22px; color: #ff9800; font-weight: 700; }
        .google-login-btn { width: 38px; height: 38px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 1px solid #ddd; }
        
        .location-bar { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; background: #fafafa; }
        .switch { position: relative; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4caf50; }
        input:checked + .slider:before { transform: translateX(18px); }

        .search-container { padding: 15px 20px; }
        .search-bar { background: #f1f3f4; border-radius: 12px; padding: 12px 15px; display: flex; align-items: center; }
        .search-bar input { border: none; background: transparent; outline: none; flex: 1; margin-left: 10px; }

        .main-content { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .categories { display: flex; gap: 12px; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; }
        .cat-item { flex: 0 0 80px; text-align: center; background: #fff; padding: 10px; border-radius: 12px; border: 1px solid #eee; }
        .cat-item i { font-size: 22px; color: #ff9800; margin-bottom: 5px; display: block; }
        .cat-item span { font-size: 10px; font-weight: 600; }

        .p-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .p-card { background: #fff; border-radius: 15px; border: 1px solid #eee; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .p-img { width: 100%; height: 100px; background: #eee; }
        .p-info { padding: 10px; }
        .p-info h3 { font-size: 13px; }
        .p-price { font-size: 15px; font-weight: 700; color: #e91e63; }

        /* --- MY ACCOUNT PAGE STYLING --- */
        .profile-header { text-align: center; padding: 40px 20px; }
        .user-icon { font-size: 60px; color: #ddd; background: #f9f9f9; width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; border: 2px solid #eee; }
        
        .menu-list { padding: 20px; }
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: 12px; display: flex; align-items: center; font-weight: 600; transition: 0.3s; }
        .btn-dark { background: #333; color: #fff; cursor: pointer; }
        .btn-blur { background: #f0f0f0; color: #999; filter: blur(1px); opacity: 0.6; pointer-events: none; }
        .menu-item i { margin-right: 15px; width: 20px; text-align: center; }

        /* Form Overlay */
        #store-overlay { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .form-box { background: #fff; padding: 25px; border-radius: 20px; width: 85%; }
        .form-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn-submit { width: 100%; padding: 12px; background: #4caf50; color: #fff; border: none; border-radius: 8px; font-weight: bold; }

        /* --- BOTTOM NAV --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; padding: 10px 0; border-top: 1px solid #eee; }
        .nav-item { flex: 1; text-align: center; cursor: pointer; color: #bbb; text-decoration: none; }
        .nav-item i { font-size: 20px; display: block; }
        .nav-item span { font-size: 10px; font-weight: 700; }
        .nav-active { color: inherit; }
        .n-home-active { color: #4caf50; }
        .n-map-active { color: #2196f3; }
        .n-user-active { color: #f44336; }
    </style>
</head>
<body>

    <div id="home-page" class="page active-page">
        <div class="header">
            <div class="logo-area"><h1>Sabse Sasta</h1><span>पास में सबसे सस्ता कहाँ?</span></div>
            <div class="google-login-btn"><img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18"></div>
        </div>
        <div class="location-bar">
            <div><i class="fas fa-map-marker-alt" style="color:#4caf50"></i> Your Location</div>
            <label class="switch"><input type="checkbox"><span class="slider"></span></label>
        </div>
        <div class="main-content">
            <div class="search-container"><div class="search-bar"><i class="fas fa-search"></i><input type="text" placeholder="सस्ता सामान खोजें..."></div></div>
            <div class="categories">
                <div class="cat-item"><i class="fas fa-cookie"></i><span>Sweets</span></div>
                <div class="cat-item"><i class="fas fa-shopping-basket"></i><span>Grocery</span></div>
                <div class="cat-item"><i class="fas fa-mobile-alt"></i><span>Mobile</span></div>
            </div>
            <div class="p-list">
                <div class="p-card"><div class="p-img"></div><div class="p-info"><h3>Gulab Jamun</h3><div class="p-price">₹220/kg</div></div></div>
                <div class="p-card"><div class="p-img"></div><div class="p-info"><h3>Basmati Rice</h3><div class="p-price">₹55/kg</div></div></div>
            </div>
        </div>
    </div>

    <div id="account-page" class="page">
        <div class="profile-header">
            <div class="user-icon"><i class="fas fa-user"></i></div>
        </div>
        <div class="menu-list">
            <div class="menu-item btn-dark" onclick="showForm()"><i class="fas fa-plus-circle"></i> Create Account</div>
            <div class="menu-item btn-blur locked"><i class="fas fa-exchange-alt"></i> Switch Account</div>
            <div class="menu-item btn-blur locked"><i class="fas fa-cart-plus"></i> Add Product</div>
            <div class="menu-item btn-blur locked"><i class="fas fa-info-circle"></i> Details</div>
            <div class="menu-item btn-dark" style="margin-top:20px"><i class="fas fa-sign-out-alt"></i> Logout</div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item n-home-active" onclick="showPage('home')"><i class="fas fa-home"></i><span>HOME</span></div>
        <div class="nav-item" style="color:#2196f3"><i class="fas fa-map-marked-alt"></i><span>VIEW ON MAP</span></div>
        <div class="nav-item n-user-active" onclick="showPage('account')"><i class="fas fa-user-circle"></i><span>MY ACCOUNT</span></div>
    </div>

    <div id="store-overlay">
        <div class="form-box">
            <h3>दुकान की जानकारी</h3>
            <input type="text" id="sName" placeholder="दुकान का नाम">
            <button class="btn-submit" onclick="done()">अकाउंट बनाएँ</button>
        </div>
    </div>

    <script>
        // पेज बदलने का फंक्शन
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId + '-page').classList.add('active-page');
        }

        function showForm() { document.getElementById('store-overlay').style.display = 'flex'; }

        function done() {
            if(document.getElementById('sName').value == "") return alert("नाम लिखें");
            document.querySelectorAll('.locked').forEach(el => {
                el.classList.remove('btn-blur');
                el.classList.add('btn-dark');
                el.style.filter = 'none'; el.style.pointerEvents = 'auto'; el.style.opacity = '1';
            });
            document.getElementById('store-overlay').style.display = 'none';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sabse Sasta | Real Business App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        body { background: #fff; height: 100vh; overflow: hidden; }

        /* --- Page Swapping --- */
        .page { display: none; height: 100vh; flex-direction: column; }
        .active-page { display: flex; }

        /* --- HOME PAGE --- */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; }
        .logo-area h1 { font-size: 22px; color: #ff9800; font-weight: 700; }
        .google-login-btn { width: 38px; height: 38px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 1px solid #ddd; }
        .main-content { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .p-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .p-card { background: #fff; border-radius: 15px; border: 1px solid #eee; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .p-img { width: 100%; height: 100px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; color: #ddd; }

        /* --- MY ACCOUNT PAGE --- */
        .profile-header { text-align: center; padding: 30px 20px; }
        .user-icon { font-size: 50px; color: #ccc; background: #f9f9f9; width: 90px; height: 90px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; border: 2px solid #eee; }
        .menu-list { padding: 15px; }
        .menu-item { padding: 14px; margin-bottom: 10px; border-radius: 12px; display: flex; align-items: center; font-weight: 600; transition: 0.3s; font-size: 14px; }
        .btn-dark { background: #222; color: #fff; cursor: pointer; }
        .btn-blur { background: #f0f0f0; color: #aaa; filter: blur(1px); opacity: 0.6; pointer-events: none; }
        .menu-item i { margin-right: 15px; width: 20px; text-align: center; }

        /* --- OVERLAYS (Forms) --- */
        .overlay { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .form-box { background: #fff; padding: 20px; border-radius: 20px; width: 100%; max-width: 350px; position: relative; }
        .form-scroll { max-height: 400px; overflow-y: auto; margin: 15px 0; padding-right: 5px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .btn-submit { width: 100%; padding: 12px; background: #4caf50; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* --- SHOP DETAILS SPECIFIC --- */
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
        .photo-input { background: #f5f5f5; border: 1px dashed #bbb; height: 50px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; color: #777; }
        .loc-btn { background: #e3f2fd; color: #1976d2; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #bbdefb; margin: 10px 0; font-size: 13px; cursor: pointer; }

        /* --- BOTTOM NAV --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; padding: 10px 0; border-top: 1px solid #eee; }
        .nav-item { flex: 1; text-align: center; cursor: pointer; color: #bbb; }
        .nav-active-home { color: #4caf50; }
        .nav-active-user { color: #f44336; }
        .nav-item i { font-size: 20px; display: block; }
        .nav-item span { font-size: 10px; font-weight: 700; }
    </style>
</head>
<body>

    <div id="home-page" class="page active-page">
        <div class="header">
            <div class="logo-area"><h1>Sabse Sasta</h1><span>पास में सबसे सस्ता कहाँ?</span></div>
            <div class="google-login-btn"><img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18"></div>
        </div>
        <div class="main-content">
            <div class="p-list">
                <div class="p-card"><div class="p-img"><i class="fas fa-image"></i></div><div class="p-info"><h3>Sweets</h3><div class="p-price">₹200</div></div></div>
                <div class="p-card"><div class="p-img"><i class="fas fa-image"></i></div><div class="p-info"><h3>Milk</h3><div class="p-price">₹60</div></div></div>
            </div>
        </div>
    </div>

    <div id="account-page" class="page">
        <div class="profile-header">
            <div class="user-icon"><i class="fas fa-user"></i></div>
        </div>
        <div class="menu-list">
            <div class="menu-item btn-dark" onclick="openForm('create-overlay')"><i class="fas fa-plus-circle"></i> Create Account</div>
            <div class="menu-item btn-blur locked"><i class="fas fa-exchange-alt"></i> Switch Account</div>
            <div class="menu-item btn-blur locked"><i class="fas fa-cart-plus"></i> Add Product</div>
            <div class="menu-item btn-blur locked" onclick="openForm('details-overlay')"><i class="fas fa-info-circle"></i> Details</div>
            <div class="menu-item btn-dark" style="margin-top:20px"><i class="fas fa-sign-out-alt"></i> Logout</div>
        </div>
    </div>

    <div id="create-overlay" class="overlay">
        <div class="form-box">
            <h3>स्वागत है!</h3>
            <input type="text" id="storeNameInput" placeholder="अपनी दुकान का नाम लिखें">
            <button class="btn-submit" onclick="finishCreate()">आगे बढ़ें</button>
        </div>
    </div>

    <div id="details-overlay" class="overlay">
        <div class="form-box">
            <h3 style="color:#ff9800">दुकान की पूरी जानकारी</h3>
            <div class="form-scroll">
                <input type="text" placeholder="आपका नाम (First Name)">
                <input type="text" placeholder="Store का नाम">
                <input type="number" placeholder="Mobile नंबर">
                <input type="number" placeholder="WhatsApp नंबर">
                <textarea placeholder="दुकान का पूरा पता"></textarea>
                
                <div class="loc-btn" onclick="alert('GPS चालू करें...')"><i class="fas fa-map-marker-alt"></i> Shop Location Set करें</div>
                
                <p style="font-size:11px; font-weight:bold; margin-top:10px">4 फोटो अपलोड करें:</p>
                <div class="photo-grid">
                    <div class="photo-input"><i class="fas fa-camera"></i><span>FRONT</span></div>
                    <div class="photo-input"><i class="fas fa-camera"></i><span>INSIDE</span></div>
                    <div class="photo-input"><i class="fas fa-camera"></i><span>LEFT</span></div>
                    <div class="photo-input"><i class="fas fa-camera"></i><span>RIGHT</span></div>
                </div>

                <p style="font-size:11px; font-weight:bold; margin-top:10px">दुकान का समय:</p>
                <div style="display:flex; gap:5px"><input type="time" title="Open"><input type="time" title="Close"></div>
            </div>
            <button class="btn-submit" onclick="closeForm('details-overlay')">सेव करें</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item nav-active-home" onclick="showPage('home')"><i class="fas fa-home"></i><span>HOME</span></div>
        <div class="nav-item" style="color:#2196f3"><i class="fas fa-map-marked-alt"></i><span>MAP</span></div>
        <div class="nav-item nav-active-user" onclick="showPage('account')"><i class="fas fa-user-circle"></i><span>ACCOUNT</span></div>
    </div>

    <script>
        function showPage(p) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
            document.getElementById(p + '-page').classList.add('active-page');
        }

        function openForm(id) { document.getElementById(id).style.display = 'flex'; }
        function closeForm(id) { document.getElementById(id).style.display = 'none'; }

        function finishCreate() {
            if(document.getElementById('storeNameInput').value == "") return alert("नाम लिखें");
            document.querySelectorAll('.locked').forEach(el => {
                el.classList.remove('btn-blur'); el.classList.add('btn-dark');
                el.style.filter = 'none'; el.style.pointerEvents = 'auto'; el.style.opacity = '1';
            });
            closeForm('create-overlay');
            alert("अकाउंट बन गया! अब Details भरें।");
        }
    </script>
</body>
</html>

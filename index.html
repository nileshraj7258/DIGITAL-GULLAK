<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> SASTA STORE | Full Edition </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        body { background: #fdfdfd; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- Page Logic --- */
        .page { display: none; height: 100vh; flex-direction: column; overflow: hidden; }
        .active-page { display: flex; }

        /* --- 1. HOME PAGE (Original) --- */
        .home-header { background: url('https://img.freepik.com/free-photo/blurred-shelf-supermarket_74190-2115.jpg'); background-size: cover; padding: 20px; text-align: center; color: white; position: relative; }
        .home-header::before { content: ""; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 1; }
        .header-content { position: relative; z-index: 2; }
        .logo-main { font-size: 32px; font-weight: 900; color: #ffca28; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .loc-box { background: #fff; border-radius: 8px; padding: 10px; display: flex; justify-content: space-between; align-items: center; color: #333; margin-top: 10px; }
        .search-container { background: #fff; border-radius: 8px; padding: 10px; display: flex; align-items: center; margin-top: 10px; }
        .search-container input { border: none; flex: 1; outline: none; margin-left: 10px; }

        /* --- 2. NEW ACCOUNT DESIGN --- */
        .profile-section { background: linear-gradient(135deg, #6200ea, #e91e63); height: 120px; width: 100%; position: relative; }
        .avatar-area { margin-top: -50px; text-align: center; position: relative; z-index: 5; }
        .avatar-box { width: 100px; height: 100px; background: white; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 50px; color: #ccc; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .store-title { font-size: 24px; font-weight: 900; color: #333; margin-top: 10px; text-transform: uppercase; }
        .rev-text { color: #ff5722; font-weight: bold; font-size: 14px; margin-bottom: 15px; }

        /* Ratings Row */
        .ratings-row { display: flex; gap: 10px; padding: 0 20px; margin-bottom: 20px; }
        .rate-card { flex: 1; background: white; padding: 12px 5px; border-radius: 15px; text-align: center; border: 1px solid #eee; }
        .rate-card b { display: block; font-size: 20px; color: #333; }
        .rate-card span { font-size: 10px; font-weight: bold; color: #888; text-transform: uppercase; }

        /* Action Buttons */
        .btn-list { padding: 0 20px; flex: 1; overflow-y: auto; }
        
        .btn-create { background: #6200ea; color: white; margin-bottom: 15px; padding: 18px; border-radius: 15px; display: flex; align-items: center; font-weight: bold; cursor: pointer; justify-content: space-between; box-shadow: 0 4px 10px rgba(98,0,234,0.2); }
        
        .btn-white { background: white; color: #333; margin-bottom: 12px; padding: 16px; border-radius: 15px; display: flex; align-items: center; font-weight: bold; cursor: pointer; border: 1px solid #eee; justify-content: space-between; }
        .btn-white i { width: 30px; font-size: 18px; }
        
        .orange-badge { background: #ff9800; color: white; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; }

        .btn-blur { filter: blur(2px); opacity: 0.5; pointer-events: none; }

        /* --- 3. OVERLAYS (Original Features) --- */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; overflow-y: auto; }
        .form-box { background: white; border-radius: 20px; padding: 20px; width: 100%; }
        
        .cam-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .cam-box { aspect-ratio: 1; border: 2px dashed #ccc; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; font-size: 11px; background: #fafafa; }
        
        input, textarea, select { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }

        /* --- BOTTOM NAV --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; padding: 12px 0; border-top: 1px solid #eee; }
        .nav-item { flex: 1; text-align: center; color: #bbb; cursor: pointer; font-size: 12px; font-weight: bold; }
        .nav-active { color: #ff9800; }
    </style>
</head>
<body>

    <div id="home-page" class="page active-page">
        <div class="home-header">
            <div class="header-content">
                <div class="logo-main">SASTA STORE <span style="background:#ff5722; padding:2px 8px; border-radius:5px; color:white">₹</span></div>
                <div class="loc-box">
                    <span><i class="fas fa-map-marker-alt"></i> Janakpuri, Delhi</span>
                    <span style="color:#2196f3; font-size:12px; font-weight:bold">CHANGE</span>
                </div>
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search for Products...">
                </div>
            </div>
        </div>
        <div style="padding:20px; color:#888; text-align:center;">Home content load ho raha hai...</div>
    </div>

    <div id="account-page" class="page">
        <div class="profile-section"></div>
        <div class="avatar-area">
            <div class="avatar-box"><i class="fas fa-user"></i></div>
            <div id="view-store-name" class="store-title">SHOP NAME</div>
            <div class="rev-text">REVIEWS</div>
        </div>

        <div class="ratings-row">
            <div class="rate-card" onclick="upRate('g-count')"><b id="g-count">0</b><span>GOOD</span></div>
            <div class="rate-card" onclick="upRate('b-count')"><b id="b-count">0</b><span>BEST</span></div>
            <div class="rate-card" onclick="openOverlay('issue-overlay')"><b id="i-count">0</b><span>ISSUE</span></div>
        </div>

        <div class="btn-list">
            <div class="btn-create" onclick="openOverlay('create-acc-overlay')">
                <span><i class="fas fa-plus-circle"></i> Create Account</span>
                <i class="fas fa-chevron-right" style="font-size:12px;"></i>
            </div>

            <div id="l1" class="btn-white btn-blur">
                <span><i class="fas fa-exchange-alt" style="color:#2196f3"></i> Switch Account</span>
                <i class="fas fa-chevron-right" style="color:#ddd"></i>
            </div>

            <div id="l2" class="btn-white btn-blur" onclick="openOverlay('product-overlay')">
                <span><i class="fas fa-cart-plus" style="color:#ff9800"></i> Add Product</span>
                <div class="orange-badge" id="p-count">0</div>
            </div>

            <div id="l3" class="btn-white btn-blur" onclick="openOverlay('details-overlay')">
                <span><i class="fas fa-file-alt" style="color:#ef5350"></i> Details</span>
                <i class="fas fa-chevron-right" style="color:#ddd"></i>
            </div>

            <div class="btn-white" style="margin-top:20px; background:#fff5f5; color:#f44336; justify-content:center;">
                <i class="fas fa-sign-out-alt"></i> LOGOUT
            </div>
        </div>
        <div style="height:80px;"></div>
    </div>

    <div id="create-acc-overlay" class="overlay">
        <div class="form-box">
            <h2 style="margin-bottom:15px">दुकान का रजिस्ट्रेशन</h2>
            <div style="max-height:70vh; overflow-y:auto; padding-right:5px">
                <input type="text" id="regName" placeholder="दुकान का नाम">
                <input type="text" placeholder="आपका नाम">
                <select>
                    <option>दुकान की Category चुनें</option>
                    <option>Sweets</option>
                    <option>Dairy</option>
                </select>

                <div class="cam-grid">
                    <div class="cam-item"><div class="cam-box"><i class="fas fa-camera"></i>Front Photo</div></div>
                    <div class="cam-item"><div class="cam-box"><i class="fas fa-camera"></i>Inside Photo</div></div>
                    <div class="cam-item"><div class="cam-box"><i class="fas fa-camera"></i>Rate List</div></div>
                    <div class="cam-item"><div class="cam-box"><i class="fas fa-camera"></i>Shop QR</div></div>
                </div>

                <div style="display:flex; gap:10px;">
                    <input type="time" title="Open"> <input type="time" title="Close">
                </div>
                
                <div style="background:#e3f2fd; color:#1976d2; padding:15px; border-radius:10px; margin:10px 0; text-align:center; font-weight:bold" onclick="alert('GPS Location Set!')">
                    <i class="fas fa-crosshairs"></i> Shop Location Set करें
                </div>
                
                <textarea id="regDetails" placeholder="दुकान के बारे में विस्तार से लिखें..."></textarea>
            </div>
            <button onclick="saveAcc()" style="width:100%; padding:15px; margin-top:10px; background:#4caf50; color:white; border:none; border-radius:10px; font-weight:bold">सबमिट करें</button>
            <p onclick="closeOverlay('create-acc-overlay')" style="text-align:center; margin-top:10px; color:#888;">Back</p>
        </div>
    </div>

    <div id="issue-overlay" class="overlay">
        <div class="form-box">
            <h2 style="color:red; margin-bottom:15px;">क्या समस्या है?</h2>
            <select id="issueSelect" onchange="checkOther(this.value)">
                <option>Price jyada hai</option>
                <option>Saman nahin mila</option>
                <option>Quality acchi nahin thi</option>
                <option>Location galat tha</option>
                <option>Behaviour achcha nahin tha</option>
                <option value="other">Other</option>
            </select>
            <textarea id="otherBox" style="display:none;" placeholder="अपनी समस्या लिखें..."></textarea>
            <button onclick="saveIssue()" style="width:100%; padding:15px; margin-top:10px; background:#333; color:white; border:none; border-radius:10px;">रिपोर्ट करें</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item nav-active" onclick="showPage('home')"><i class="fas fa-home"></i><br>HOME</div>
        <div class="nav-item" style="color:#2196f3;"><i class="fas fa-map-marked-alt"></i><br>MAP</div>
        <div class="nav-item" onclick="showPage('account')"><i class="fas fa-user-circle"></i><br>ACCOUNT</div>
    </div>

    <script>
        function showPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page'));
            document.getElementById(p + '-page').classList.add('active-page');
        }
        function openOverlay(id) { document.getElementById(id).style.display = 'flex'; }
        function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }

        function upRate(id) {
            let el = document.getElementById(id);
            el.innerText = parseInt(el.innerText) + 1;
        }

        function checkOther(v) { document.getElementById('otherBox').style.display = (v==='other') ? 'block' : 'none'; }

        function saveIssue() {
            upRate('i-count');
            closeOverlay('issue-overlay');
        }

        let prods = 0;
        function saveAcc() {
            let n = document.getElementById('regName').value;
            if(!n) return alert("नाम भरें");
            document.getElementById('view-store-name').innerText = n;
            document.getElementById('l1').classList.remove('btn-blur');
            document.getElementById('l2').classList.remove('btn-blur');
            document.getElementById('l3').classList.remove('btn-blur');
            closeOverlay('create-acc-overlay');
        }
    </script>
</body>
</html>

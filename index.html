<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | Sabse Sasta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        body { background: #f4f4f4; color: #333; }

        /* Account Page Container */
        .account-container {
            max-width: 400px; margin: auto; background: #fff; min-height: 100vh;
            display: flex; flex-direction: column; padding: 20px;
        }

        /* Profile Header */
        .profile-header {
            text-align: center; margin-bottom: 30px; padding-top: 20px;
        }
        .user-icon {
            font-size: 80px; color: #ddd; background: #f9f9f9;
            border-radius: 50%; width: 120px; height: 120px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px; border: 2px solid #eee;
        }

        /* Menu List */
        .menu-list { list-style: none; }
        
        .menu-item {
            padding: 15px; margin-bottom: 10px; border-radius: 12px;
            display: flex; align-items: center; cursor: pointer;
            transition: 0.3s; font-weight: 600; font-size: 16px;
        }

        /* Dark Buttons (Create & Logout) */
        .btn-dark { background: #333; color: #fff; }
        .btn-dark:hover { background: #000; }

        /* Blur/Disabled State for other buttons */
        .btn-blur {
            background: #f0f0f0; color: #999;
            filter: blur(1px); /* धुंधलापन */
            pointer-events: none; /* क्लिक नहीं होगा */
            opacity: 0.7;
        }

        /* Icons */
        .menu-item i { margin-right: 15px; font-size: 20px; width: 25px; text-align: center; }

        /* Create Account Form (Hidden by default) */
        #store-form {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center;
        }
        .form-box {
            background: #fff; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px;
        }
        .form-box h3 { margin-bottom: 20px; color: #ff9800; }
        .form-box input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border: 1px solid #ddd; border-radius: 8px;
        }
        .btn-submit { background: #4caf50; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; }

    </style>
</head>
<body>

    <div class="account-container">
        <div class="profile-header">
            <div class="user-icon">
                <i class="fas fa-user"></i>
            </div>
        </div>

        <div class="menu-list">
            <div class="menu-item btn-dark" onclick="openStoreForm()">
                <i class="fas fa-plus-circle"></i> Create Account
            </div>

            <div class="menu-item btn-blur locked">
                <i class="fas fa-exchange-alt"></i> Switch Account
            </div>

            <div class="menu-item btn-blur locked">
                <i class="fas fa-cart-plus"></i> Add Product
            </div>

            <div class="menu-item btn-blur locked">
                <i class="fas fa-info-circle"></i> Details
            </div>

            <div class="menu-item btn-dark" style="margin-top: 30px;">
                <i class="fas fa-sign-out-alt"></i> Logout
            </div>
        </div>
    </div>

    <div id="store-form">
        <div class="form-box">
            <h3>दुकान की जानकारी</h3>
            <input type="text" id="storeName" placeholder="Store का नाम लिखें...">
            <input type="text" placeholder="शहर / इलाका">
            <button class="btn-submit" onclick="activateAccount()">अकाउंट बनाएँ</button>
        </div>
    </div>

    <script>
        // Form खोलने के लिए
        function openStoreForm() {
            document.getElementById('store-form').style.display = 'flex';
        }

        // अकाउंट एक्टिवेट करने के बाद सब डार्क हो जाएगा
        function activateAccount() {
            const storeName = document.getElementById('storeName').value;
            if (storeName === "") {
                alert("कृपया दुकान का नाम डालें!");
                return;
            }

            // Blur हटाना और सबको डार्क करना
            const lockedItems = document.querySelectorAll('.locked');
            lockedItems.forEach(item => {
                item.classList.remove('btn-blur');
                item.classList.add('btn-dark'); // सब डार्क हो गए
                item.style.filter = 'none';
                item.style.pointerEvents = 'auto';
                item.style.opacity = '1';
            });

            // फॉर्म बंद करें
            document.getElementById('store-form').style.display = 'none';
            alert(storeName + " का अकाउंट तैयार है!");
        }
    </script>

</body>
</html>
